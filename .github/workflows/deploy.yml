name: Deploy

on:
  push:
    branches: [staging, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to staging
        working-directory: backend
        run: railway up --service 652d357c-7b4f-418b-b4a3-7e4ad087d364 --detach

      - name: Deploy celery-worker to staging
        working-directory: backend
        run: railway up --service f39e6d8e-18f2-4f06-b330-dc1dae88dc3a --detach

      - name: Deploy frontend to staging
        working-directory: frontend
        run: railway up --service f307e246-f170-4865-9274-ffde9532792e --detach

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to production
        working-directory: backend
        run: railway up --service 652d357c-7b4f-418b-b4a3-7e4ad087d364 --detach

      - name: Deploy celery-worker to production
        working-directory: backend
        run: railway up --service f39e6d8e-18f2-4f06-b330-dc1dae88dc3a --detach

      - name: Deploy frontend to production
        working-directory: frontend
        run: railway up --service f307e246-f170-4865-9274-ffde9532792e --detach
