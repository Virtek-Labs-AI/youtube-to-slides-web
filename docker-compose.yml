version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: youtube_slides
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - slides_storage:/tmp/youtube-to-slides
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  presenton:
    image: ghcr.io/presenton/presenton:latest
    ports:
      - "5000:80"
    environment:
      - MIGRATE_DATABASE_ON_STARTUP=true
      - LLM=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - DISABLE_ANONYMOUS_TRACKING=true
    volumes:
      - presenton_data:/app_data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  celery_worker:
    build: ./backend
    command: celery -A celery_worker worker --loglevel=info
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      presenton:
        condition: service_healthy
    volumes:
      - slides_storage:/tmp/youtube-to-slides
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_worker inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.frontend
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  slides_storage:
  presenton_data:
